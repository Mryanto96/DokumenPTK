<!DOCTYPE html>
<html lang="id" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Blog | SMP Persiapan Negeri Pulau Tiga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .password-modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 20000;
            align-items: center;
            justify-content: center;
        }

        .password-box {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .password-box input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin: 20px 0;
        }

        .admin-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 48px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .admin-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .admin-title i {
            color: var(--c1);
            font-size: 1.4rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--c1);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--c1);
        }

        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg2);
        }

        .image-upload-area:hover {
            border-color: var(--c1);
            background: var(--bg3);
            transform: translateY(-2px);
        }

        .image-upload-area i {
            font-size: 2.5rem;
            color: var(--c1);
            margin-bottom: 12px;
        }

        .image-preview {
            margin-top: 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .image-preview img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--c1);
        }

        .form-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .btn-primary,
        .btn-secondary,
        .btn-danger {
            padding: 12px 28px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--c1), var(--c2));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .btn-secondary:hover {
            background: var(--bg2);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }

        .ql-container {
            min-height: 350px;
            font-family: var(--font);
            font-size: 0.9rem;
        }

        .ql-toolbar {
            border-radius: 16px 16px 0 0;
            background: var(--bg2);
            border-color: var(--border);
        }

        .ql-container {
            border-radius: 0 0 16px 16px;
            border-color: var(--border);
            background: var(--bg);
            color: var(--text);
        }

        .ql-editor {
            min-height: 350px;
        }

        .blog-list {
            margin-top: 40px;
        }

        .blog-list-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .blog-list-info h4 {
            margin-bottom: 5px;
        }

        .blog-list-info p {
            font-size: 0.8rem;
            color: var(--text2);
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 10005;
            animation: slideInRight 0.3s ease;
        }

        .toast-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .toast-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .toast-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .form-actions {
                flex-direction: column-reverse;
            }

            .btn-primary,
            .btn-secondary {
                justify-content: center;
            }
        }

        .empty-list {
            text-align: center;
            padding: 40px;
            background: var(--bg2);
            border-radius: 16px;
            color: var(--text2);
        }
    </style>
</head>

<body>

    <!-- TIDAK ADA NAVBAR PUBLIK - HANYA UNTUK ADMIN -->
    <div class="page-content">
        <div class="container" style="padding: 40px 0;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="font-size: 2rem;"><span class="gradient-text">Admin Blog</span></h1>
                <p style="color: var(--text2);">Kelola artikel blog (buat, edit, hapus)</p>
                <a href="blog.html" style="color: var(--c1);">← Lihat halaman publik</a>
            </div>

            <!-- FORM TAMBAH/EDIT ARTIKEL -->
            <div class="admin-panel">
                <div class="admin-header">
                    <div class="admin-title"><i class="fas fa-pen-alt"></i> Form Artikel</div>
                </div>
                <div id="adminForm">
                    <input type="hidden" id="editId" value="">
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Judul Artikel</label>
                        <input type="text" id="blogTitle" placeholder="Masukkan judul artikel...">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Kategori</label>
                        <select id="blogCategory">
                            <option value="tips">📘 Tips Mengajar</option>
                            <option value="experience">🎓 Pengalaman Mengajar</option>
                            <option value="news">📰 Berita Sekolah</option>
                            <option value="activity">🎯 Kegiatan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> Gambar Sampul</label>
                        <div class="image-upload-area" id="uploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Klik atau drag & drop untuk upload gambar</p>
                            <p style="font-size: 0.7rem;">(Gambar akan diupload ke ImgBB)</p>
                        </div>
                        <input type="file" id="imageFile" accept="image/*" style="display: none;">
                        <div class="image-preview" id="imagePreview">
                            <img id="previewImg" src="" alt="Preview">
                            <button type="button" class="btn-secondary btn-sm" onclick="removeImage()"><i
                                    class="fas fa-trash-alt"></i> Hapus Gambar</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-edit"></i> Isi Artikel</label>
                        <div id="editor"></div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-secondary" id="cancelBtn"><i class="fas fa-times"></i> Batal</button>
                        <button class="btn-primary" id="saveBlogBtn"><i class="fas fa-save"></i> Simpan Artikel</button>
                    </div>
                </div>
            </div>

            <!-- DAFTAR ARTIKEL -->
            <h3 style="margin-bottom: 20px;"><i class="fas fa-list"></i> Daftar Artikel</h3>
            <div class="blog-list" id="blogList"></div>
        </div>
    </div>

    <footer>
        <div class="container">© 2026 SMP Persiapan Negeri Pulau Tiga. All rights are reserved</div>
    </footer>

    <script>
        const STORAGE_KEY = 'blog_articles';
        const ADMIN_PASSWORD = 'admin123';
        const IMGBB_API_KEY = '97d4e1c605c07bf4b9742dcb56e69a2e';

        let quill;
        let isAuthenticated = false;

        function checkAuth() {
            const auth = sessionStorage.getItem('blog_admin_auth');
            if (auth === 'true') {
                isAuthenticated = true;
                initApp();
            } else {
                showPasswordModal();
            }
        }

        function showPasswordModal() {
            const modal = document.createElement('div');
            modal.className = 'password-modal';
            modal.innerHTML = `
                <div class="password-box">
                    <i class="fas fa-lock" style="font-size: 3rem; color: var(--c1);"></i>
                    <h2 style="margin: 20px 0;">Akses Admin</h2>
                    <p>Masukkan password untuk mengelola blog</p>
                    <input type="password" id="adminPassword" placeholder="Password">
                    <button class="btn-primary" id="submitPassword" style="width: 100%;">Masuk</button>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('submitPassword').addEventListener('click', () => {
                const password = document.getElementById('adminPassword').value;
                if (password === ADMIN_PASSWORD) {
                    sessionStorage.setItem('blog_admin_auth', 'true');
                    modal.remove();
                    isAuthenticated = true;
                    initApp();
                } else {
                    alert('Password salah!');
                }
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function initQuill() {
            quill = new Quill('#editor', {
                theme: 'snow',
                placeholder: 'Tulis artikel di sini...',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                        ['blockquote', 'code-block'],
                        [{ 'align': [] }],
                        ['link', 'image', 'video'],
                        ['clean']
                    ]
                }
            });
        }

        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) return result.data.url;
                throw new Error('Upload gagal');
            } catch (error) {
                showToast('Gagal upload gambar', 'error');
                return null;
            }
        }

        const uploadArea = document.getElementById('uploadArea');
        const imageFile = document.getElementById('imageFile');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const blogImageInput = document.createElement('input');
        blogImageInput.type = 'hidden';
        blogImageInput.id = 'blogImage';
        document.getElementById('adminForm').appendChild(blogImageInput);

        uploadArea.addEventListener('click', () => imageFile.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = 'var(--c1)'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'var(--border)'; });
        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--border)';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) await handleImageUpload(file);
        });
        imageFile.addEventListener('change', async (e) => { if (e.target.files[0]) await handleImageUpload(e.target.files[0]); });

        async function handleImageUpload(file) {
            showToast('Mengupload gambar...', 'warning');
            const reader = new FileReader();
            reader.onload = (e) => { previewImg.src = e.target.result; imagePreview.style.display = 'flex'; uploadArea.style.display = 'none'; };
            reader.readAsDataURL(file);
            const imageUrl = await uploadToImgBB(file);
            if (imageUrl) {
                blogImageInput.value = imageUrl;
                showToast('Gambar berhasil diupload!', 'success');
            } else {
                imagePreview.style.display = 'none'; uploadArea.style.display = 'block'; blogImageInput.value = '';
            }
        }

        function removeImage() {
            imagePreview.style.display = 'none';
            uploadArea.style.display = 'block';
            blogImageInput.value = '';
            imageFile.value = '';
        }

        function loadArticles() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) return JSON.parse(stored);
            localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            return [];
        }

        function saveArticles(articles) { localStorage.setItem(STORAGE_KEY, JSON.stringify(articles)); }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function renderBlogList() {
            const articles = loadArticles();
            const container = document.getElementById('blogList');

            if (articles.length === 0) {
                container.innerHTML = `<div class="empty-list"><i class="fas fa-newspaper" style="font-size: 3rem; margin-bottom: 16px;"></i><p>Belum ada artikel. Silakan buat artikel pertama!</p></div>`;
                return;
            }

            const sortedArticles = [...articles].sort((a, b) => new Date(b.date) - new Date(a.date));
            container.innerHTML = sortedArticles.map(article => `
                <div class="blog-list-item">
                    <div class="blog-list-info">
                        <h4>${escapeHtml(article.title)}</h4>
                        <p><i class="fas fa-calendar"></i> ${formatDate(article.date)} | <i class="fas fa-tag"></i> ${article.category} | <i class="fas fa-eye"></i> ${article.views || 0} views</p>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-secondary btn-sm" onclick="editArticle(${article.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-danger btn-sm" onclick="confirmDelete(${article.id})"><i class="fas fa-trash"></i> Hapus</button>
                    </div>
                </div>
            `).join('');
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('blogTitle').value = '';
            document.getElementById('blogCategory').value = 'tips';
            if (quill) quill.root.innerHTML = '';
            removeImage();
        }

        function saveArticle() {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('blogTitle').value.trim();
            const category = document.getElementById('blogCategory').value;
            const image = blogImageInput.value.trim();
            const content = quill.root.innerHTML;

            if (!title) { showToast('Judul harus diisi!', 'error'); return; }
            if (!content || content === '<p><br></p>') { showToast('Isi artikel harus diisi!', 'error'); return; }

            const articles = loadArticles();

            if (id) {
                const index = articles.findIndex(a => a.id == id);
                if (index !== -1) {
                    articles[index] = { ...articles[index], title, category, image, content, updatedAt: new Date().toISOString() };
                    saveArticles(articles);
                    showToast('Artikel berhasil diupdate!', 'success');
                }
            } else {
                const newArticle = { id: Date.now(), title, category, image, content, date: new Date().toISOString(), views: 0 };
                articles.unshift(newArticle);
                saveArticles(articles);
                showToast('Artikel berhasil ditambahkan!', 'success');
            }
            resetForm();
            renderBlogList();
        }

        function editArticle(id) {
            const articles = loadArticles();
            const article = articles.find(a => a.id === id);
            if (article) {
                document.getElementById('editId').value = article.id;
                document.getElementById('blogTitle').value = article.title;
                document.getElementById('blogCategory').value = article.category;
                if (article.image) {
                    blogImageInput.value = article.image;
                    previewImg.src = article.image;
                    imagePreview.style.display = 'flex';
                    uploadArea.style.display = 'none';
                } else {
                    removeImage();
                }
                if (quill) quill.root.innerHTML = article.content;
                document.querySelector('.admin-panel').scrollIntoView({ behavior: 'smooth' });
            }
        }

        let deleteId = null;
        function confirmDelete(id) { deleteId = id; document.getElementById('confirmModal').style.display = 'flex'; }
        function closeConfirmModal() { document.getElementById('confirmModal').style.display = 'none'; deleteId = null; }
        function deleteArticle() {
            if (deleteId) {
                let articles = loadArticles();
                articles = articles.filter(a => a.id !== deleteId);
                saveArticles(articles);
                renderBlogList();
                closeConfirmModal();
                showToast('Artikel berhasil dihapus!', 'success');
                if (document.getElementById('editId').value == deleteId) resetForm();
            }
        }

        function initApp() {
            initQuill();
            renderBlogList();
            document.getElementById('saveBlogBtn')?.addEventListener('click', saveArticle);
            document.getElementById('cancelBtn')?.addEventListener('click', resetForm);
        }

        const confirmModalHtml = `
            <div id="confirmModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:20001; align-items:center; justify-content:center;">
                <div style="background:var(--card-bg); border-radius:24px; padding:32px; text-align:center; max-width:350px;">
                    <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#ef4444;"></i>
                    <h3>Hapus Artikel?</h3>
                    <p>Yakin ingin menghapus artikel ini?</p>
                    <div style="display:flex; gap:12px; justify-content:center;">
                        <button class="btn-secondary" onclick="closeConfirmModal()">Batal</button>
                        <button class="btn-danger" onclick="deleteArticle()">Hapus</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', confirmModalHtml);
        window.closeConfirmModal = closeConfirmModal;
        window.deleteArticle = deleteArticle;
        window.editArticle = editArticle;
        window.confirmDelete = confirmDelete;
        window.removeImage = removeImage;

        checkAuth();
    </script>
</body>

</html>

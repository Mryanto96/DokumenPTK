<!DOCTYPE html>
<html lang="id" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Blog | SMP Persiapan Negeri Pulau Tiga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .password-modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 20000;
            align-items: center;
            justify-content: center;
        }

        .password-box {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .password-box input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin: 20px 0;
        }

        .admin-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 48px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .admin-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .admin-title i {
            color: var(--c1);
            font-size: 1.4rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--c1);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--c1);
        }

        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg2);
        }

        .image-upload-area:hover {
            border-color: var(--c1);
            background: var(--bg3);
            transform: translateY(-2px);
        }

        .image-upload-area i {
            font-size: 2.5rem;
            color: var(--c1);
            margin-bottom: 12px;
        }

        .image-preview {
            margin-top: 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .image-preview img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--c1);
        }

        .form-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .btn-primary,
        .btn-secondary,
        .btn-danger {
            padding: 12px 28px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--c1), var(--c2));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .btn-secondary:hover {
            background: var(--bg2);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }

        .ql-container {
            min-height: 350px;
            font-family: var(--font);
            font-size: 0.9rem;
        }

        .ql-toolbar {
            border-radius: 16px 16px 0 0;
            background: var(--bg2);
            border-color: var(--border);
        }

        .ql-container {
            border-radius: 0 0 16px 16px;
            border-color: var(--border);
            background: var(--bg);
            color: var(--text);
        }

        .ql-editor {
            min-height: 350px;
        }

        .blog-list {
            margin-top: 40px;
        }

        .blog-list-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .blog-list-info h4 {
            margin-bottom: 5px;
        }

        .blog-list-info p {
            font-size: 0.8rem;
            color: var(--text2);
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 10005;
            animation: slideInRight 0.3s ease;
        }

        .toast-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .toast-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .toast-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .form-actions {
                flex-direction: column-reverse;
            }

            .btn-primary,
            .btn-secondary {
                justify-content: center;
            }
        }

        .empty-list {
            text-align: center;
            padding: 40px;
            background: var(--bg2);
            border-radius: 16px;
            color: var(--text2);
        }
    </style>
</head>

<body>

    <div class="page-content">
        <div class="container" style="padding: 40px 0;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="font-size: 2rem;"><span class="gradient-text">Admin Blog</span></h1>
                <p style="color: var(--text2);">Kelola artikel blog (buat, edit, hapus)</p>
                <a href="blog.html" style="color: var(--c1);">← Lihat halaman publik</a>
            </div>

            <!-- FORM TAMBAH/EDIT ARTIKEL -->
            <div class="admin-panel">
                <div class="admin-header">
                    <div class="admin-title"><i class="fas fa-pen-alt"></i> Form Artikel</div>
                </div>
                <div id="adminForm">
                    <input type="hidden" id="editId" value="">
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Judul Artikel</label>
                        <input type="text" id="blogTitle" placeholder="Masukkan judul artikel...">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Kategori</label>
                        <select id="blogCategory">
                            <option value="tips">📘 Tips Mengajar</option>
                            <option value="experience">🎓 Pengalaman Mengajar</option>
                            <option value="news">📰 Berita Sekolah</option>
                            <option value="activity">🎯 Kegiatan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> Gambar Sampul</label>
                        <div class="image-upload-area" id="uploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Klik atau drag & drop untuk upload gambar</p>
                            <p style="font-size: 0.7rem;">(Gambar akan diupload ke ImgBB)</p>
                        </div>
                        <input type="file" id="imageFile" accept="image/*" style="display: none;">
                        <div class="image-preview" id="imagePreview">
                            <img id="previewImg" src="" alt="Preview">
                            <button type="button" class="btn-secondary btn-sm" onclick="removeImage()"><i
                                    class="fas fa-trash-alt"></i> Hapus Gambar</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-edit"></i> Isi Artikel</label>
                        <div id="editor"></div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-secondary" id="cancelBtn"><i class="fas fa-times"></i> Batal</button>
                        <button class="btn-primary" id="saveBlogBtn"><i class="fas fa-save"></i> Simpan Artikel</button>
                    </div>
                </div>
            </div>

            <!-- DAFTAR ARTIKEL -->
            <h3 style="margin-bottom: 20px;"><i class="fas fa-list"></i> Daftar Artikel</h3>
            <div class="blog-list" id="blogList"></div>
        </div>
    </div>

    <footer>
        <div class="container">© 2026 SMP Persiapan Negeri Pulau Tiga. All rights are reserved</div>
    </footer>

    <script>
        // ===== KONFIGURASI =====
        // GANTI DENGAN WEB APP URL ANDA!
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBAv3l73qBYqrDuHuKbKM2M-8lB-VMEFrnHwMFWCyh3M4GWFpPbIb87SOrxSJmPOKHSQ/exec';
        const ADMIN_PASSWORD = 'admin123';
        const IMGBB_API_KEY = '97d4e1c605c07bf4b9742dcb56e69a2e';

        let quill;
        let isAuthenticated = false;
        let currentImageUrl = '';

        // ==================== AUTHENTICATION ====================
        function checkAuth() {
            const auth = sessionStorage.getItem('blog_admin_auth');
            if (auth === 'true') {
                isAuthenticated = true;
                initApp();
            } else {
                showPasswordModal();
            }
        }

        function showPasswordModal() {
            const modal = document.createElement('div');
            modal.className = 'password-modal';
            modal.id = 'passwordModal';
            modal.innerHTML = `
                <div class="password-box">
                    <i class="fas fa-lock" style="font-size: 3rem; color: var(--c1);"></i>
                    <h2 style="margin: 20px 0;">Akses Admin</h2>
                    <p>Masukkan password untuk mengelola blog</p>
                    <input type="password" id="adminPassword" placeholder="Password">
                    <button class="btn-primary" id="submitPassword" style="width: 100%;">Masuk</button>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('submitPassword').addEventListener('click', () => {
                const password = document.getElementById('adminPassword').value;
                if (password === ADMIN_PASSWORD) {
                    sessionStorage.setItem('blog_admin_auth', 'true');
                    modal.remove();
                    isAuthenticated = true;
                    initApp();
                } else {
                    alert('Password salah!');
                }
            });
        }

        // ==================== TOAST NOTIFICATION ====================
        function showToast(message, type = 'success') {
            const oldToast = document.querySelector('.toast-notification');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ==================== QUILL EDITOR ====================
        function initQuill() {
            quill = new Quill('#editor', {
                theme: 'snow',
                placeholder: 'Tulis artikel di sini... Anda dapat menggunakan heading, bold, list, dan lainnya.',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                        ['blockquote', 'code-block'],
                        [{ 'align': [] }],
                        ['link', 'image', 'video'],
                        ['clean']
                    ]
                }
            });
        }

        // ==================== IMAGE UPLOAD TO IMGBB ====================
        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    return result.data.url;
                } else {
                    throw new Error(result.error?.message || 'Upload gagal');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showToast('Gagal upload gambar: ' + error.message, 'error');
                return null;
            }
        }

        // Image upload handlers
        const uploadArea = document.getElementById('uploadArea');
        const imageFile = document.getElementById('imageFile');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');

        if (uploadArea) {
            uploadArea.addEventListener('click', () => imageFile.click());
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = 'var(--c1)';
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = 'var(--border)';
            });
            uploadArea.addEventListener('drop', async (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = 'var(--border)';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    await handleImageUpload(file);
                }
            });
        }

        if (imageFile) {
            imageFile.addEventListener('change', async (e) => {
                if (e.target.files[0]) await handleImageUpload(e.target.files[0]);
            });
        }

        async function handleImageUpload(file) {
            showToast('Mengupload gambar...', 'warning');

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                imagePreview.style.display = 'flex';
                uploadArea.style.display = 'none';
            };
            reader.readAsDataURL(file);

            const imageUrl = await uploadToImgBB(file);
            if (imageUrl) {
                currentImageUrl = imageUrl;
                showToast('Gambar berhasil diupload!', 'success');
            } else {
                imagePreview.style.display = 'none';
                uploadArea.style.display = 'block';
                currentImageUrl = '';
            }
        }

        function removeImage() {
            imagePreview.style.display = 'none';
            uploadArea.style.display = 'block';
            currentImageUrl = '';
            imageFile.value = '';
        }

        // ==================== CRUD OPERATIONS ====================
        async function loadArticles() {
            try {
                const url = `${APPS_SCRIPT_URL}?action=getAllArticlesAdmin&t=${Date.now()}`;
                console.log('Fetching articles from:', url);

                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();
                console.log('Load articles result:', result);

                if (result.success && Array.isArray(result.data)) {
                    return result.data;
                }
                return [];
            } catch (error) {
                console.error('Error loading articles:', error);
                showToast('Gagal memuat artikel: ' + error.message, 'error');
                return [];
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            } catch (e) {
                return dateString;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function renderBlogList() {
            const container = document.getElementById('blogList');
            if (!container) return;

            container.innerHTML = '<div class="empty-list"><i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i><p>Memuat data...</p></div>';

            const articles = await loadArticles();

            if (articles.length === 0) {
                container.innerHTML = `<div class="empty-list"><i class="fas fa-newspaper" style="font-size: 3rem; margin-bottom: 16px;"></i><p>Belum ada artikel. Silakan buat artikel pertama!</p></div>`;
                return;
            }

            container.innerHTML = articles.map(article => `
                <div class="blog-list-item" data-id="${article.id}">
                    <div class="blog-list-info">
                        <h4>${escapeHtml(article.judul)}</h4>
                        <p><i class="fas fa-calendar"></i> ${formatDate(article.timestamp)} | <i class="fas fa-tag"></i> ${article.kategori} | <i class="fas fa-eye"></i> ${article.views || 0} views</p>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-secondary btn-sm" onclick="editArticle(${article.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-danger btn-sm" onclick="confirmDelete(${article.id})"><i class="fas fa-trash"></i> Hapus</button>
                    </div>
                </div>
            `).join('');
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('blogTitle').value = '';
            document.getElementById('blogCategory').value = 'tips';
            if (quill) {
                quill.root.innerHTML = '';
            }
            removeImage();
        }

        async function saveArticle() {
            const id = document.getElementById('editId').value;
            const judul = document.getElementById('blogTitle').value.trim();
            const kategori = document.getElementById('blogCategory').value;
            const gambar = currentImageUrl;
            const isi = quill.root.innerHTML;

            if (!judul) {
                showToast('Judul harus diisi!', 'error');
                return;
            }
            if (!isi || isi === '<p><br></p>') {
                showToast('Isi artikel harus diisi!', 'error');
                return;
            }

            const saveBtn = document.getElementById('saveBlogBtn');
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
            saveBtn.disabled = true;

            try {
                let response, result;

                if (id) {
                    response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'updateArticle',
                            id: parseInt(id),
                            judul: judul,
                            kategori: kategori,
                            gambar: gambar,
                            isi: isi
                        })
                    });
                    result = await response.json();
                    if (result.success) {
                        showToast('Artikel berhasil diupdate!', 'success');
                        resetForm();
                        await renderBlogList();
                    } else {
                        showToast(result.message || 'Gagal mengupdate artikel', 'error');
                    }
                } else {
                    response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'addArticle',
                            judul: judul,
                            kategori: kategori,
                            gambar: gambar,
                            isi: isi
                        })
                    });
                    result = await response.json();
                    if (result.success) {
                        showToast('Artikel berhasil ditambahkan!', 'success');
                        resetForm();
                        await renderBlogList();
                    } else {
                        showToast(result.message || 'Gagal menambahkan artikel', 'error');
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Terjadi kesalahan: ' + error.message, 'error');
            } finally {
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }
        }

        async function editArticle(id) {
            try {
                showToast('Memuat artikel...', 'warning');
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getArticleById&id=${id}&t=${Date.now()}`);
                const result = await response.json();

                if (result.success && result.data) {
                    const article = result.data;
                    document.getElementById('editId').value = article.id;
                    document.getElementById('blogTitle').value = article.judul;
                    document.getElementById('blogCategory').value = article.kategori;

                    if (article.gambar && article.gambar !== '') {
                        currentImageUrl = article.gambar;
                        previewImg.src = article.gambar;
                        imagePreview.style.display = 'flex';
                        uploadArea.style.display = 'none';
                    } else {
                        removeImage();
                    }

                    if (quill) {
                        quill.root.innerHTML = article.isi;
                    }

                    document.querySelector('.admin-panel').scrollIntoView({ behavior: 'smooth' });
                    showToast('Artikel siap diedit', 'success');
                } else {
                    showToast('Artikel tidak ditemukan', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Gagal memuat artikel: ' + error.message, 'error');
            }
        }

        // ==================== DELETE CONFIRMATION ====================
        let deleteId = null;

        function confirmDelete(id) {
            deleteId = id;
            const modal = document.getElementById('confirmModal');
            if (modal) modal.style.display = 'flex';
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirmModal');
            if (modal) modal.style.display = 'none';
            deleteId = null;
        }

        async function deleteArticle() {
            if (!deleteId) return;

            const deleteBtn = document.getElementById('confirmDeleteBtn');
            const originalText = deleteBtn.innerHTML;
            deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menghapus...';
            deleteBtn.disabled = true;

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'deleteArticle',
                        id: deleteId
                    })
                });
                const result = await response.json();

                if (result.success) {
                    showToast('Artikel berhasil dihapus!', 'success');
                    await renderBlogList();
                    if (document.getElementById('editId').value == deleteId) {
                        resetForm();
                    }
                    closeConfirmModal();
                } else {
                    showToast(result.message || 'Gagal menghapus artikel', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Terjadi kesalahan: ' + error.message, 'error');
            } finally {
                deleteBtn.innerHTML = originalText;
                deleteBtn.disabled = false;
            }
        }

        // ==================== INITIALIZATION ====================
        async function initApp() {
            initQuill();
            await renderBlogList();

            const saveBtn = document.getElementById('saveBlogBtn');
            const cancelBtn = document.getElementById('cancelBtn');

            if (saveBtn) saveBtn.addEventListener('click', saveArticle);
            if (cancelBtn) cancelBtn.addEventListener('click', resetForm);
        }

        // ==================== MODAL HTML ====================
        if (!document.getElementById('confirmModal')) {
            const confirmModalHtml = `
                <div id="confirmModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:20001; align-items:center; justify-content:center;">
                    <div style="background:var(--card-bg); border-radius:24px; padding:32px; text-align:center; max-width:350px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#ef4444;"></i>
                        <h3 style="margin: 16px 0 8px 0;">Hapus Artikel?</h3>
                        <p style="margin-bottom: 24px;">Yakin ingin menghapus artikel ini? Tindakan ini tidak dapat dibatalkan.</p>
                        <div style="display:flex; gap:12px; justify-content:center;">
                            <button class="btn-secondary" id="confirmCancelBtn">Batal</button>
                            <button class="btn-danger" id="confirmDeleteBtn">Hapus</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', confirmModalHtml);
        }

        // Pasang event listener untuk modal confirm
        const confirmCancelBtn = document.getElementById('confirmCancelBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        if (confirmCancelBtn) confirmCancelBtn.addEventListener('click', closeConfirmModal);
        if (confirmDeleteBtn) confirmDeleteBtn.addEventListener('click', deleteArticle);

        // Expose fungsi ke global scope untuk onclick di HTML
        window.closeConfirmModal = closeConfirmModal;
        window.deleteArticle = deleteArticle;
        window.editArticle = editArticle;
        window.confirmDelete = confirmDelete;
        window.removeImage = removeImage;

        // Start authentication
        checkAuth();
    </script>
</body>

</html>

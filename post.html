<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Artikel | SMP Persiapan Negeri Pulau Tiga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .article-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .article-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .article-category {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
        }

        .article-category.tips {
            background: #10b981;
        }

        .article-category.experience {
            background: #3b82f6;
        }

        .article-category.news {
            background: #f59e0b;
        }

        .article-category.activity {
            background: #8b5cf6;
        }

        .article-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .article-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text2);
            flex-wrap: wrap;
        }

        .article-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 32px;
        }

        .article-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text2);
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            color: var(--text);
            margin-top: 32px;
            margin-bottom: 16px;
        }

        .article-content p {
            margin-bottom: 16px;
        }

        .article-content ul,
        .article-content ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }

        .article-content blockquote {
            border-left: 4px solid var(--c1);
            padding-left: 20px;
            margin: 20px 0;
            font-style: italic;
        }

        .article-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 20px 0;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 8px 20px;
            border-radius: 99px;
            background: var(--bg3);
            color: var(--text);
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-button:hover {
            background: var(--c1);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        @media (max-width: 768px) {
            .article-title {
                font-size: 1.5rem;
            }

            .article-meta {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="nav-inner">
                <a href="index.html" class="logo">
                    <div class="logo-icon">SMP</div>
                    <div class="logo-text">
                        <span class="logo-title">Persiapan Negeri</span>
                        <span class="logo-sub">Pulau Tiga • Nakai</span>
                    </div>
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="documents.html">Documents</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="grades.html">Students Grades</a></li>
                    <li><a href="exam.html">Ujian</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="about.html">About Me</a></li>
                    <li><a href="contact.html">Contact Me</a></li>
                </ul>
                <div class="nav-right">
                    <button class="dark-toggle" aria-label="Toggle dark mode">
                        <div class="dark-toggle-ball">☀️</div>
                    </button>
                    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
                </div>
            </div>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="documents.html">Documents</a>
        <a href="gallery.html">Gallery</a>
        <a href="grades.html">Students Grades</a>
        <a href="exam.html">Ujian</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About Me</a>
        <a href="contact.html">Contact Me</a>
    </div>

    <div class="page-content">
        <div class="container">
            <div class="article-container">
                <!-- <a href="blog.html" class="back-button"><i class="fas fa-arrow-left"></i> Kembali ke Blog</a> -->
                <div id="articleContent">
                    <div class="loading"><i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i>
                        <p>Memuat artikel...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">© 2026 SMP Persiapan Negeri Pulau Tiga. All rights are reserved</div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const STORAGE_KEY = 'blog_articles';

        function getArticleId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        function loadArticles() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function updateViews(article) {
            const articles = loadArticles();
            const index = articles.findIndex(a => a.id === article.id);
            if (index !== -1) {
                articles[index].views = (articles[index].views || 0) + 1;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(articles));
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderArticle() {
            const id = getArticleId();
            if (!id) {
                document.getElementById('articleContent').innerHTML = '<div class="loading"><p>Artikel tidak ditemukan.</p></div>';
                return;
            }

            const articles = loadArticles();
            const article = articles.find(a => a.id == id);

            if (!article) {
                document.getElementById('articleContent').innerHTML = '<div class="loading"><p>Artikel tidak ditemukan.</p></div>';
                return;
            }

            updateViews(article);

            const categoryLabels = { tips: 'Tips Mengajar', experience: 'Pengalaman Mengajar', news: 'Berita Sekolah', activity: 'Kegiatan' };

            const html = `
                <div class="article-header">
                    <span class="article-category ${article.category}">${categoryLabels[article.category]}</span>
                    <h1 class="article-title">${escapeHtml(article.title)}</h1>
                    <div class="article-meta">
                        <span><i class="fas fa-calendar-alt"></i> ${formatDate(article.date)}</span>
                        <span><i class="fas fa-eye"></i> ${(article.views || 0) + 1} views</span>
                    </div>
                </div>
                ${article.image ? `<img src="${article.image}" alt="${escapeHtml(article.title)}" class="article-image" onerror="this.style.display='none'">` : ''}
                <div class="article-content">${article.content}</div>
                <div style="margin-top: 40px; text-align: center;">
                    <a href="blog.html" class="back-button" style="background: var(--c1); color: white;"><i class="fas fa-arrow-left"></i> Kembali ke Blog</a>
                </div>
            `;

            document.getElementById('articleContent').innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', renderArticle);
    </script>
</body>

</html>

    <style>
        .article-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .article-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .article-category {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
        }

        .article-category.tips {
            background: #10b981;
        }

        .article-category.experience {
            background: #3b82f6;
        }

        .article-category.news {
            background: #f59e0b;
        }

        .article-category.activity {
            background: #8b5cf6;
        }

        .article-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .article-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text2);
            flex-wrap: wrap;
        }

        .article-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .article-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 32px;
        }

        .article-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text2);
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            color: var(--text);
            margin-top: 32px;
            margin-bottom: 16px;
        }

        .article-content h1 {
            font-size: 1.8rem;
        }

        .article-content h2 {
            font-size: 1.5rem;
        }

        .article-content h3 {
            font-size: 1.2rem;
        }

        .article-content p {
            margin-bottom: 16px;
        }

        .article-content ul,
        .article-content ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }

        .article-content li {
            margin-bottom: 8px;
        }

        .article-content blockquote {
            border-left: 4px solid var(--c1);
            padding-left: 20px;
            margin: 20px 0;
            font-style: italic;
            color: var(--text);
        }

        .article-content code {
            background: var(--bg2);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
        }

        .article-content pre {
            background: var(--bg2);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
        }

        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .article-content th,
        .article-content td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        .article-content th {
            background: var(--bg3);
        }

        .article-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 20px 0;
        }

        .article-content iframe {
            max-width: 100%;
            border-radius: 12px;
            margin: 20px 0;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 8px 20px;
            border-radius: 99px;
            background: var(--bg3);
            color: var(--text);
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-button:hover {
            background: var(--c1);
            color: white;
        }

        .share-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .share-btn {
            padding: 8px 16px;
            border-radius: 99px;
            background: var(--bg2);
            color: var(--text);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .share-btn:hover {
            transform: translateY(-2px);
        }

        .share-btn.whatsapp {
            background: #25D366;
            color: white;
        }

        .share-btn.facebook {
            background: #1877F2;
            color: white;
        }

        .share-btn.twitter {
            background: #1DA1F2;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--c1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        .error-message {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg2);
            border-radius: 24px;
        }

        .error-message i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .article-title {
                font-size: 1.5rem;
            }

            .article-meta {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }

            .share-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<br><br>
    <div class="page-content">
        <div class="container">
            <div class="article-container">
                <!-- disini -->
                <div id="articleContent">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Memuat artikel...</p>
                    </div>
                </div>
            </div>
        </div>

    <script src="js/main.js"></script>
    <script>
        // ===== KONFIGURASI =====
        // GANTI DENGAN WEB APP URL ANDA!
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5X3m01IOS11ELql_n80JMSLxEqTJtSgCcqALxAU9nTeSZoEuF_xcK8NkIIUbkHD6OWA/exec';

        // ===== FUNGSI =====
        function getArticleId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function getCategoryLabel(kategori) {
            const labels = {
                tips: 'Tips Mengajar',
                experience: 'Pengalaman Mengajar',
                news: 'Berita Sekolah',
                activity: 'Kegiatan'
            };
            return labels[kategori] || 'Artikel';
        }

        function getCategoryColor(kategori) {
            const colors = {
                tips: '#10b981',
                experience: '#3b82f6',
                news: '#f59e0b',
                activity: '#8b5cf6'
            };
            return colors[kategori] || '#10b981';
        }

        // ===== UPDATE VIEWS (tambah 1) =====
        async function updateViews(id) {
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updateViews',
                        id: parseInt(id)
                    })
                });
            } catch (error) {
                console.error('Error updating views:', error);
            }
        }

        // ===== AMBIL ARTIKEL DARI APPS SCRIPT =====
        async function loadArticle(id) {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getArticleById&id=${id}&t=${Date.now()}`);
                const result = await response.json();

                if (result.success && result.data) {
                    return result.data;
                }
                return null;
            } catch (error) {
                console.error('Error loading article:', error);
                return null;
            }
        }

        // ===== RENDER ARTIKEL =====
        async function renderArticle() {
            const container = document.getElementById('articleContent');
            if (!container) return;

            const id = getArticleId();

            if (!id) {
                container.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Artikel Tidak Ditemukan</h3>
                        <p>ID artikel tidak valid.</p>
                        <a href="blog.html" class="back-button" style="margin-top: 20px;">← Kembali ke Blog</a>
                    </div>
                `;
                return;
            }

            const article = await loadArticle(id);

            if (!article) {
                container.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-search"></i>
                        <h3>Artikel Tidak Ditemukan</h3>
                        <p>Artikel yang Anda cari tidak tersedia atau telah dihapus.</p>
                        <a href="blog.html" class="back-button" style="margin-top: 20px;">← Kembali ke Blog</a>
                    </div>
                `;
                return;
            }

            // Update views setelah artikel berhasil dimuat
            await updateViews(id);

            const categoryLabel = getCategoryLabel(article.kategori);
            const categoryColor = getCategoryColor(article.kategori);

            // Tampilkan artikel dengan views yang sudah diupdate (+1)
            const currentViews = (article.views || 0) + 1;

            const html = `
                <div class="article-header">
                    <span class="article-category ${article.kategori}" style="background: ${categoryColor}">
                        ${categoryLabel}
                    </span>
                    <h1 class="article-title">${escapeHtml(article.judul)}</h1>
                    <div class="article-meta">
                        <span><i class="fas fa-calendar-alt"></i> ${formatDate(article.timestamp)}</span>
                        <span><i class="fas fa-eye"></i> ${currentViews} views</span>
                    </div>
                </div>
                ${article.gambar ? `<img src="${article.gambar}" alt="${escapeHtml(article.judul)}" class="article-image" onerror="this.style.display='none'">` : ''}
                <div class="article-content">
                    ${article.isi}
                </div>
                <div class="share-buttons">
                    <a href="https://wa.me/?text=${encodeURIComponent('Baca artikel: ' + article.judul + ' - ' + window.location.href)}" target="_blank" class="share-btn whatsapp">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="share-btn facebook">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </a>
                    <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent('Baca artikel: ' + article.judul)}&url=${encodeURIComponent(window.location.href)}" target="_blank" class="share-btn twitter">
                        <i class="fab fa-twitter"></i> Twitter
                    </a>
                </div>
                <div style="margin-top: 40px; text-align: center;">
                    <a href="blog.html" class="back-button" style="background: var(--c1); color: white;">
                        <i class="fas fa-arrow-left"></i> Kembali ke Blog
                    </a>
                </div>
            `;

            container.innerHTML = html;
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            renderArticle();
        });
    </script>
</body>

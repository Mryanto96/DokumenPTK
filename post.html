    <style>
        /* ===== ARTIKEL TERKAIT - STYLE LIST VERTICAL DENGAN THUMBNAIL ===== */
        .related-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .related-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .related-title i {
            color: var(--c1);
            font-size: 1rem;
        }

        /* List style - stack vertikal dengan thumbnail */
        .related-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .related-item {
            display: flex;
            gap: 16px;
            text-decoration: none;
            transition: all 0.2s ease;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .related-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .related-item:hover {
            transform: translateX(4px);
        }

        /* Thumbnail gambar */
        .related-thumb {
            flex-shrink: 0;
            width: 100px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg3);
        }

        .related-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .related-thumb .no-image {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--c1), var(--c2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            opacity: 0.7;
        }

        /* Konten artikel */
        .related-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Badge kategori */
        .related-item-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.65rem;
            font-weight: 600;
            color: white;
            width: fit-content;
        }

        /* Judul artikel */
        .related-item-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
            margin: 0;
        }

        /* Deskripsi singkat / excerpt */
        .related-item-excerpt {
            font-size: 0.75rem;
            color: var(--text2);
            line-height: 1.5;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Meta info: tanggal + views */
        .related-item-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.65rem;
            color: var(--text3);
        }

        .related-item-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .article-bottom {
            display: flex;
            justify-content: center;
            padding-top: 8px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 99px;
            background: var(--c1);
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .back-button:hover {
            background: var(--c2);
            transform: translateY(-2px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .related-section {
                padding: 0 16px 40px;
            }

            .related-thumb {
                width: 85px;
                height: 70px;
            }

            .related-item-title {
                font-size: 0.85rem;
            }

            .related-item-excerpt {
                font-size: 0.7rem;
                white-space: normal;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                line-clamp: 2;
                -webkit-box-orient: vertical;
            }
        }

        @media (max-width: 480px) {
            .related-item {
                gap: 12px;
            }

            .related-thumb {
                width: 75px;
                height: 65px;
                border-radius: 10px;
            }

            .related-item-title {
                font-size: 0.8rem;
            }

            .related-item-excerpt {
                font-size: 0.65rem;
            }

            .related-item-meta {
                font-size: 0.6rem;
                gap: 10px;
            }

            .related-item-badge {
                font-size: 0.6rem;
                padding: 2px 8px;
            }
        }

        /* Dark mode support */
        body.dark .related-item {
            border-bottom-color: var(--border);
        }
    </style>
</head>

    <div class="page-content">
        <div class="container">

            <!-- KONTEN ARTIKEL -->
            <div class="article-container">
                <div id="articleContent">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Memuat artikel...</p>
                    </div>
                </div>
            </div>

            <!-- ARTIKEL TERKAIT - STYLE LIST VERTICAL -->
            <div class="related-section" id="relatedSection" style="display:none;">
                <h3 class="related-title">
                    <i class="fas fa-book-open"></i> Artikel Lainnya
                </h3>
                <div class="related-list" id="relatedList"></div>
                <div class="article-bottom">
                    <a href="blog.html" class="back-button">

    <script src="js/main.js"></script>
    <script>
        // ===== KONFIGURASI =====
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKklVbd31j2FospmGAJoXkGGZyaASx8MQ3bHzK0GauTwNbEPhc0cIm8lVnHxt32Z-__Q/exec';

        // ===== HELPER =====
        function getArticleId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function getCategoryLabel(kategori) {
            const labels = {
                tips: 'Tips Mengajar',
                experience: 'Pengalaman Mengajar',
                news: 'Berita Sekolah',
                activity: 'Kegiatan'
            };
            return labels[kategori] || 'Artikel';
        }

        function getCategoryColor(kategori) {
            const colors = {
                tips: '#10b981',
                experience: '#3b82f6',
                news: '#f59e0b',
                activity: '#8b5cf6'
            };
            return colors[kategori] || '#10b981';
        }

        // Buat excerpt dari konten (ambil teks polos, potong 100 karakter)
        function getExcerpt(htmlContent, maxLength = 100) {
            if (!htmlContent) return '';
            // Hilangkan tag HTML
            const plainText = htmlContent.replace(/<[^>]*>/g, '');
            if (plainText.length <= maxLength) return plainText;
            return plainText.substring(0, maxLength) + '...';
        }

        // ===== UPDATE VIEWS =====
        async function updateViews(id) {
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateViews',
                        id: parseInt(id)
                    })
                });
            } catch (error) {
                console.error('Error updating views:', error);
            }
        }

        // ===== AMBIL SATU ARTIKEL =====
        async function loadArticle(id) {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getArticleById&id=${id}&t=${Date.now()}`);
                const result = await response.json();
                if (result.success && result.data) return result.data;
                return null;
            } catch (error) {
                console.error('Error loading article:', error);
                return null;
            }
        }

        // ===== AMBIL SEMUA ARTIKEL =====
        async function loadAllArticles() {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getAllArticles&t=${Date.now()}`);
                const result = await response.json();
                if (result.success && result.data) return result.data;
                return [];
            } catch (error) {
                console.error('Error loading all articles:', error);
                return [];
            }
        }

        // ===== RENDER ARTIKEL TERKAIT (STYLE LIST VERTICAL) =====
        async function renderRelatedArticles(currentId, currentKategori, currentJudul, currentKonten) {
            const section = document.getElementById('relatedSection');
            const listContainer = document.getElementById('relatedList');
            if (!section || !listContainer) return;

            const allArticles = await loadAllArticles();

            // Buang artikel yang sedang dibaca
            let others = allArticles.filter(a => a.id != currentId);

            // Selalu tampilkan section (tapi bisa kosong)
            section.style.display = 'block';

            if (others.length === 0) {
                listContainer.innerHTML = '<p style="color: var(--text3); text-align: center; padding: 20px;">Belum ada artikel lainnya.</p>';
                return;
            }

            // Prioritaskan kategori yang sama (tampilkan semua yang sama kategori, lalu tambah dari lain)
            const sameCategory = others.filter(a => a.kategori === currentKategori);
            const diffCategory = others.filter(a => a.kategori !== currentKategori);

            // Tampilkan semua artikel, tapi urutkan: kategori sama di atas, lalu kategori lain
            // Batasi maksimal 5 artikel agar tidak terlalu panjang
            let related = [...sameCategory, ...diffCategory].slice(0, 6);

            listContainer.innerHTML = related.map(article => {
                const label = getCategoryLabel(article.kategori);
                const color = getCategoryColor(article.kategori);
                const excerpt = getExcerpt(article.isi || '', 100);

                // Tampilkan views (jika ada)
                const views = article.views || 0;

                return `
                    <a href="post.html?id=${article.id}" class="related-item">
                        <span class="related-item-badge" style="background: ${color}">${label}</span>
                        <h4 class="related-item-title">${escapeHtml(article.judul)}</h4>
                        <p class="related-item-excerpt">${escapeHtml(excerpt)}</p>
                        <div class="related-item-meta">
                            <span><i class="fas fa-calendar-alt"></i> ${formatDate(article.timestamp)}</span>
                            <span><i class="fas fa-eye"></i> ${views} views</span>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // ===== RENDER ARTIKEL UTAMA =====
        async function renderArticle() {
            const container = document.getElementById('articleContent');
            if (!container) return;

            const id = getArticleId();

            if (!id) {
                container.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Artikel Tidak Ditemukan</h3>
                        <p>ID artikel tidak valid.</p>
                        <a href="blog.html" class="back-button" style="margin-top: 20px;">← Kembali ke Blog</a>
                    </div>
                `;
                return;
            }

            const article = await loadArticle(id);

            if (!article) {
                container.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-search"></i>
                        <h3>Artikel Tidak Ditemukan</h3>
                        <p>Artikel yang Anda cari tidak tersedia atau telah dihapus.</p>
                        <a href="blog.html" class="back-button" style="margin-top: 20px;">← Kembali ke Blog</a>
                    </div>
                `;
                return;
            }

            // Update views
            const storageKey = `viewed_${id}`;
            const alreadyViewed = localStorage.getItem(storageKey);
            if (!alreadyViewed) {
                await updateViews(id);
                localStorage.setItem(storageKey, 'true');
            }
            const displayViews = alreadyViewed ? (article.views || 0) : (article.views || 0) + 1;

            const categoryLabel = getCategoryLabel(article.kategori);
            const categoryColor = getCategoryColor(article.kategori);

            let articleContent = article.isi || '<p>Konten tidak tersedia.</p>';

            // Proses konten: pastikan gambar responsif
            // Biarkan HTML asli dari database (sudah safe karena dari CMS)

            container.innerHTML = `
                <div class="article-header">
                    <span class="article-category ${article.kategori}" style="background: ${categoryColor}">
                        ${categoryLabel}
                    </span>
                    <h1 class="article-title">${escapeHtml(article.judul)}</h1>
                    <div class="article-meta">
                        <span><i class="fas fa-calendar-alt"></i> ${formatDate(article.timestamp)}</span>
                        <span><i class="fas fa-eye"></i> ${displayViews} views</span>
                    </div>
                </div>
                ${article.gambar && article.gambar.trim() !== '' ? `<img src="${article.gambar}" alt="${escapeHtml(article.judul)}" class="article-image" onerror="this.style.display='none'">` : ''}
                <div class="article-content">
                    ${articleContent}
                </div>
                <div class="share-buttons">
                    <a href="https://wa.me/?text=${encodeURIComponent('Baca artikel: ' + article.judul + ' - ' + window.location.href)}"
                       target="_blank" class="share-btn whatsapp">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}"
                       target="_blank" class="share-btn facebook">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </a>
                    <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent('Baca artikel: ' + article.judul)}&url=${encodeURIComponent(window.location.href)}"
                       target="_blank" class="share-btn twitter">
                        <i class="fab fa-twitter"></i> Twitter
                    </a>
                </div>
            `;

            // Update judul tab browser
            document.title = `${article.judul} | SMP Persiapan Negeri Pulau Tiga`;

            // Render artikel terkait dengan style list vertikal
            await renderRelatedArticles(id, article.kategori, article.judul, article.isi);
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            renderArticle();
        });
    </script>
</body>
